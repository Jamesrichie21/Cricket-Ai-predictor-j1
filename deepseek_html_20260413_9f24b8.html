        function calculateTeamStrength(players) {
            let batting = 0, bowling = 0, form = 0, experience = 0;
            for (let p of players) {
                batting += p.bat;
                bowling += p.bowl;
                form += p.form;
                experience += Math.min(50, (p.matches || 20) / 2);
            }
            batting /= players.length;
            bowling /= players.length;
            form /= players.length;
            experience /= players.length;
            
            return (batting * 0.35) + (bowling * 0.30) + (form * 0.25) + (experience * 0.10);
        }

        function calculateWeaknessImpact(players, opponentBowlers) {
            let penalty = 0;
            for (let p of players) {
                let weakness = p.weakness || "";
                for (let o of opponentBowlers) {
                    if (weakness === "Spin" && o.bowl > 80) penalty += 8;
                    else if (weakness === "Pace" && o.bowl > 85) penalty += 6;
                    else if (weakness === "Elite pace" && o.bowl > 88) penalty += 12;
                    else if (weakness === "Left-arm pace" && o.bowl > 85) penalty += 10;
                    else if (weakness === "Short ball" && o.bowl > 85) penalty += 8;
                }
            }
            return Math.min(30, penalty);
        }

        function calculateMomentum(players) {
            let momentum = 0;
            for (let p of players) {
                momentum += (p.form - 70) / 10;
            }
            return Math.max(-20, Math.min(20, momentum));
        }

            let base = 45;
            let teamFactor = (teamStrength - 70) * 0.8;
            let oppFactor = (80 - opponentBowlStrength) * 0.5;
            let predicted = base + teamFactor + oppFactor + (Math.random() * 10 - 5);
            return Math.max(30, Math.min(85, Math.round(predicted)));
        }

        function predictTopBatsman(players) {
            let best = players[0];
            for (let p of players) {
                let score = (p.bat * 0.6) + (p.form * 0.4);
                if (score > (best.bat * 0.6 + best.form * 0.4)) best = p;
            }
            let predictedRuns = Math.round(35 + (best.bat - 70) * 1.5 + (best.form - 70) * 0.8 + (Math.random() * 20 - 10));
            return { name: best.name, runs: Math.max(15, Math.min(85, predictedRuns)) };
        }

        function predictTopBowler(players) {
            let best = players[0];
            for (let p of players) {
                if (p.bowl > best.bowl) best = p;
            }
            let predictedWickets = Math.round(1 + (best.bowl - 70) / 15 + (best.form - 70) / 20 + (Math.random() * 1.5 - 0.75));
            return { name: best.name, wickets: Math.max(0, Math.min(5, predictedWickets)) };
        }

        function predictToss() {
            return Math.random() > 0.5 ? "Bat First" : "Bowl First";
        }

        function generateAnalysis(teamAName, teamBName, strengthA, strengthB, weaknessA, weaknessB, momentumA, momentumB, winProbA) {
            let analysis = [];
            
            if (strengthA > strengthB + 5) {
                analysis.push(`✅ ${teamAName} has significantly stronger overall team strength (${Math.round(strengthA)} vs ${Math.round(strengthB)}).`);
            } else if (strengthB > strengthA + 5) {
                analysis.push(`✅ ${teamBName} has significantly stronger overall team strength (${Math.round(strengthB)} vs ${Math.round(strengthA)}).`);
            } else {
                analysis.push(`⚖️ Both teams are evenly matched in overall strength.`);
            }
            
            if (weaknessA > weaknessB + 10) {
                analysis.push(`⚠️ ${teamAName} players have more exploitable weaknesses against ${teamBName}'s bowling attack.`);
            } else if (weaknessB > weaknessA + 10) {
                analysis.push(`⚠️ ${teamBName} players have more exploitable weaknesses against ${teamAName}'s bowling attack.`);
            }
            
            if (momentumA > momentumB + 5) {
                analysis.push(`📈 ${teamAName} has better recent form/momentum coming into this match.`);
            } else if (momentumB > momentumA + 5) {
                analysis.push(`📈 ${teamBName} has better recent form/momentum coming into this match.`);
            }
            
            let winner = winProbA > 50 ? teamAName : teamBName;
            let reason = winProbA > 50 ? 
                `${teamAName} wins in ${Math.round(winProbA)}% of simulations due to superior ${strengthA > strengthB ? "team strength" : "matchup advantages"}.` :
                `${teamBName} wins in ${Math.round(100 - winProbA)}% of simulations due to superior ${strengthB > strengthA ? "team strength" : "matchup advantages"}.`;
            analysis.push(`🎯 Prediction: ${reason}`);
            
            return analysis.join(" ");
        }

        function simulateMatch(teamAPlayers, teamBPlayers, teamAName, teamBName) {
            let strengthA = calculateTeamStrength(teamAPlayers);
            let strengthB = calculateTeamStrength(teamBPlayers);
            
            let weaknessA = calculateWeaknessImpact(teamAPlayers, teamBPlayers.filter(p => p.bowl > 70));
            let weaknessB = calculateWeaknessImpact(teamBPlayers, teamAPlayers.filter(p => p.bowl > 70));
            
            let momentumA = calculateMomentum(teamAPlayers);
            let momentumB = calculateMomentum(teamBPlayers);
            
            let adjustedA = strengthA - (weaknessA / 100) + (momentumA / 50);
            let adjustedB = strengthB - (weaknessB / 100) + (momentumB / 50);
            
            let winsA = 0;
            let totalA = 0;
            let totalB = 0;
            let simulations = 50000;
            
            for (let i = 0; i < simulations; i++) {
                let rand1 = Math.random();
                let rand2 = Math.random();
                let z0 = Math.sqrt(-2.0 * Math.log(rand1)) * Math.cos(2 * Math.PI * rand2);
                
                let scoreA = Math.max(80, 160 + ((adjustedA - 70) * 1.2) + (z0 * 22));
                let scoreB = Math.max(80, 160 + ((adjustedB - 70) * 1.2) + (z0 * 22));
                
                if (scoreA > scoreB) winsA++;
                totalA += scoreA;
                totalB += scoreB;
            }
            
            let winProbA = (winsA / simulations) * 100;
            let avgScoreA = totalA / simulations;
            let avgScoreB = totalB / simulations;
            
            let bestBatsmanA = predictTopBatsman(teamAPlayers);
            let bestBatsmanB = predictTopBatsman(teamBPlayers);
            let bestBowlerA = predictTopBowler(teamAPlayers);
            let bestBowlerB = predictTopBowler(teamBPlayers);
            let first6A = predictFirst6Overs(strengthA, strengthB);
            let first6B = predictFirst6Overs(strengthB, strengthA);
            let tossPrediction = predictToss();
            
            let analysis = generateAnalysis(teamAName, teamBName, strengthA, strengthB, weaknessA, weaknessB, momentumA, momentumB, winProbA);
            
            return {
                team_a_win: Math.round(winProbA * 10) / 10,
                team_b_win: Math.round((100 - winProbA) * 10) / 10,
                score_a: Math.round(avgScoreA),
                score_b: Math.round(avgScoreB),
                result: avgScoreA > avgScoreB ? teamAName : teamBName,
                margin: Math.round(Math.abs(avgScoreA - avgScoreB)),
                key_batsman_a: bestBatsmanA.name,
                key_batsman_a_runs: bestBatsmanA.runs,
                key_batsman_b: bestBatsmanB.name,
                key_batsman_b_runs: bestBatsmanB.runs,
                key_bowler_a: bestBowlerA.name,
                key_bowler_a_wickets: bestBowlerA.wickets,
                key_bowler_b: bestBowlerB.name,
                key_bowler_b_wickets: bestBowlerB.wickets,
                first6_a: first6A,
                first6_b: first6B,
                toss: tossPrediction,
                analysis: analysis,
                confidence: Math.round(Math.abs(winProbA - 50) * 1.4)
            };
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        
        function loadTeams() {
            const teams = getAllTeams();
            const teamASelect = document.getElementById('teamA');
            const teamBSelect = document.getElementById('teamB');
            
            teamASelect.innerHTML = '<option value="">Select Team A</option>';
            teamBSelect.innerHTML = '<option value="">Select Team B</option>';
            
            teams.forEach(team => {
                const optionA = document.createElement('option');
                optionA.value = team;
                optionA.textContent = team;
                teamASelect.appendChild(optionA);
                
                const optionB = document.createElement('option');
                optionB.value = team;
                optionB.textContent = team;
                teamBSelect.appendChild(optionB);
            });
        }

        function loadPlayers(teamName, containerId) {
            if (!teamName) {
                document.getElementById(containerId).innerHTML = '';
                return;
            }
            
            const players = getTeamPlayers(teamName);
            const container = document.getElementById(containerId);
            container.innerHTML = players.map(p => 
                `<div class="player-item">
                    <span class="player-name">${p.name}</span>
                    <span class="player-rating">⭐ ${p.bat} | 🎯 ${p.bowl} | 📈 ${p.form}</span>
                </div>`
            ).join('');
        }

        function displayResult(prediction, teamAName, teamBName) {
            const resultDiv = document.getElementById('result');
            const contentDiv = document.getElementById('predictionContent');
            
            let winnerClass = prediction.result === teamAName ? 'winner-green' : 'loser-red';
            let loserClass = prediction.result === teamAName ? 'loser-red' : 'winner-green';
            
            contentDiv.innerHTML = `
                <div class="win-percentage">
                    <div class="team-a-percent">
                        <div class="percentage ${prediction.team_a_win > prediction.team_b_win ? 'win-green' : 'loss-red'}">${prediction.team_a_win}%</div>
                        <div>${teamAName}</div>
                    </div>
                    <div class="team-b-percent">
                        <div class="percentage ${prediction.team_b_win > prediction.team_a_win ? 'win-green' : 'loss-red'}">${prediction.team_b_win}%</div>
                        <div>${teamBName}</div>
                    </div>
                </div>
                
                <div class="scores">
                    <div class="score-card">
                        <div class="score-number">${prediction.score_a}</div>
                        <div>Expected Score</div>
                    </div>
                    <div class="score-card">
                        <div class="score-number">${prediction.score_b}</div>
                        <div>Expected Score</div>
                    </div>
                </div>
                
                <div class="result-text">
                    🏆 <span class="${winnerClass}">${prediction.result}</span> wins by <span class="${winnerClass}">${prediction.margin}</span> runs
                </div>
                
                <div class="betting-predictions">
                    <div class="bet-card">
                        <div class="bet-label">🎯 First 6 Overs (${teamAName})</div>
                        <div class="bet-value">${prediction.first6_a} runs</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">🎯 First 6 Overs (${teamBName})</div>
                        <div class="bet-value">${prediction.first6_b} runs</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">🏏 Top Batsman (${teamAName})</div>
                        <div class="bet-value">${prediction.key_batsman_a} - ${prediction.key_batsman_a_runs} runs</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">🏏 Top Batsman (${teamBName})</div>
                        <div class="bet-value">${prediction.key_batsman_b} - ${prediction.key_batsman_b_runs} runs</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">⚡ Top Bowler (${teamAName})</div>
                        <div class="bet-value">${prediction.key_bowler_a} - ${prediction.key_bowler_a_wickets} wkts</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">⚡ Top Bowler (${teamBName})</div>
                        <div class="bet-value">${prediction.key_bowler_b} - ${prediction.key_bowler_b_wickets} wkts</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">🪙 Toss Prediction</div>
                        <div class="bet-value">${prediction.toss}</div>
                    </div>
                    <div class="bet-card">
                        <div class="bet-label">🎯 AI Confidence</div>
                        <div class="bet-value">${prediction.confidence}%</div>
                    </div>
                </div>
                
                <div class="analysis-box">
                    <div class="analysis-title">📋 DETAILED ANALYSIS</div>
                    <div class="analysis-text">${prediction.analysis}</div>
                </div>
                
                <div class="key-players">
                    <div>🔥 ${prediction.key_batsman_a}</div>
                    <div>🔥 ${prediction.key_batsman_b}</div>
                </div>
                
                <div class="confidence">⚡ Based on 50,000 Monte Carlo simulations with historical data tuning</div>
            `;
            
            resultDiv.classList.remove('hidden');
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function predict() {
            const teamAName = document.getElementById('teamA').value;
            const teamBName = document.getElementById('teamB').value;
            
            if (!teamAName || !teamBName) {
                alert('Please select both teams');
                return;
            }
            
            if (teamAName === teamBName) {
                alert('Please select two different teams');
                return;
            }
            
            const btn = document.getElementById('predictBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '🤖 AI SIMULATING 50,000 MATCHES...';
            
            setTimeout(() => {
                const teamAPlayers = getTeamPlayers(teamAName);
                const teamBPlayers = getTeamPlayers(teamBName);
                const prediction = simulateMatch(teamAPlayers, teamBPlayers, teamAName, teamBName);
                displayResult(prediction, teamAName, teamBName);
                btn.disabled = false;
                btn.textContent = originalText;
            }, 100);
        }

        // ============================================
        // CSV UPLOAD FUNCTIONALITY
        // ============================================
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = lines[i].split(',').map(v => v.trim());
                if (values.length < 6) continue;
                
                const playerData = {};
                headers.forEach((h, idx) => {
                    playerData[h] = values[idx];
                });
                
                const playerName = playerData.player;
                if (playerName) {
                    PLAYERS_DATABASE[playerName] = {
                        team: playerData.team || PLAYERS_DATABASE[playerName]?.team || "Unknown",
                        bat: parseInt(playerData.batting) || PLAYERS_DATABASE[playerName]?.bat || 70,
                        bowl: parseInt(playerData.bowling) || PLAYERS_DATABASE[playerName]?.bowl || 0,
                        form: parseInt(playerData.form) || PLAYERS_DATABASE[playerName]?.form || 70,
                        weakness: playerData.weakness || PLAYERS_DATABASE[playerName]?.weakness || "None",
                        role: playerData.role || PLAYERS_DATABASE[playerName]?.role || "Player",
                        matches: parseInt(playerData.matches) || PLAYERS_DATABASE[playerName]?.matches || 20
                    };
                }
            }
            
            alert("CSV data uploaded successfully! Database updated.");
            loadTeams();
        }

        function uploadCSV() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select a CSV file first");
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                parseCSV(e.target.result);
            };
            reader.readAsText(file);
        }

        function resetToDefault() {
            if (confirm("Reset all data to default IPL 2026 database? This will lose any uploaded data.")) {
                location.reload();
            }
        }

        // ============================================
        // EVENT LISTENERS & INIT
        // ============================================
        
        document.getElementById('teamA').addEventListener('change', (e) => {
            loadPlayers(e.target.value, 'playersA');
        });
        
        document.getElementById('teamB').addEventListener('change', (e) => {
            loadPlayers(e.target.value, 'playersB');
        });
        
        document.getElementById('predictBtn').addEventListener('click', predict);
        document.getElementById('uploadBtn').addEventListener('click', uploadCSV);
        document.getElementById('resetDataBtn').addEventListener('click', resetToDefault);
        
        loadTeams();
    </script>
