<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cricket AI Predictor - IPL 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 20px 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: #ffd700;
            font-size: 11px;
            margin-top: 4px;
        }

        .team-selectors {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .team-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 14px;
        }

        .team-card h2 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .team-select {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border-radius: 14px;
            border: none;
            background: #2a2a44;
            color: white;
            cursor: pointer;
        }

        .players-list {
            margin-top: 10px;
            max-height: 180px;
            overflow-y: auto;
        }

        .player-item {
            background: rgba(255, 255, 255, 0.08);
            margin: 5px 0;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .player-name {
            color: #fff;
            font-weight: 600;
        }

        .player-rating {
            color: #ffd700;
        }

        .vs-divider {
            text-align: center;
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
        }

        .predict-btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .predict-btn:active {
            transform: scale(0.97);
        }

        .predict-btn:disabled {
            opacity: 0.6;
        }

        .result-card {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .result-header h2 {
            color: #ffd700;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
        }

        .win-percentage {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
        }

        .team-a-percent, .team-b-percent {
            text-align: center;
            flex: 1;
        }

        .percentage {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }

        .scores {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .score-card {
            text-align: center;
            flex: 1;
        }

        .score-number {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .result-text {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        .key-players {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 11px;
            color: #ccc;
            gap: 10px;
        }

        .key-players div {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }

        .confidence {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #ffd700;
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 9px;
            color: #666;
        }

        @media (min-width: 500px) {
            .team-selectors {
                flex-direction: row;
                gap: 12px;
            }
            .team-card {
                flex: 1;
            }
            .vs-divider {
                display: flex;
                align-items: center;
            }
        }
    </style>

        // Load teams into dropdowns
        function loadTeams() {
            const teamASelect = document.getElementById('teamA');
            const teamBSelect = document.getElementById('teamB');
            
            Object.keys(TEAMS_DATABASE).forEach(team => {
                const optionA = document.createElement('option');
                optionA.value = team;
                optionA.textContent = team;
                teamASelect.appendChild(optionA);
                
                const optionB = document.createElement('option');
                optionB.value = team;
                optionB.textContent = team;
                teamBSelect.appendChild(optionB);
            });
        }

        // Load players for a team
        function loadPlayers(teamName, containerId) {
            if (!teamName) {
                document.getElementById(containerId).innerHTML = '';
                return;
            }
            
            const team = TEAMS_DATABASE[teamName];
            if (team) {
                const container = document.getElementById(containerId);
                container.innerHTML = team.players.map(p => 
                    `<div class="player-item">
                        <span class="player-name">${p.name}</span>
                        <span class="player-rating">⭐ ${p.bat}</span>
                    </div>`
                ).join('');
            }
        }

        // AI Prediction Engine
        function simulateMatch(teamAPlayers, teamBPlayers) {
            function calcStrength(players) {
                let batting = 0, bowling = 0, form = 0;
                for (let p of players) {
                    batting += p.bat;
                    bowling += p.bowl;
                    form += p.form;
                }
                batting /= players.length;
                bowling /= players.length;
                form /= players.length;
                return (batting * 0.4) + (bowling * 0.35) + (form * 0.25);
            }
            
            let strengthA = calcStrength(teamAPlayers);
            let strengthB = calcStrength(teamBPlayers);
            
            let winsA = 0;
            let totalA = 0;
            let totalB = 0;
            
            // 10,000 simulations
            for (let i = 0; i < 10000; i++) {
                let rand = Math.random();
                let z0 = Math.sqrt(-2.0 * Math.log(rand)) * Math.cos(2 * Math.PI * Math.random());
                let scoreA = Math.max(80, 160 + ((strengthA - 70) * 0.8) + (z0 * 25));
                let scoreB = Math.max(80, 160 + ((strengthB - 70) * 0.8) + (z0 * 25));
                
                if (scoreA > scoreB) winsA++;
                totalA += scoreA;
                totalB += scoreB;
            }
            
            let winProbA = winsA / 10000;
            
            // Find best players
            let bestA = teamAPlayers[0];
            let bestB = teamBPlayers[0];
            for (let p of teamAPlayers) {
                if (p.bat + p.form > bestA.bat + bestA.form) bestA = p;
            }
            for (let p of teamBPlayers) {
                if (p.bat + p.form > bestB.bat + bestB.form) bestB = p;
            }
            
            let margin = Math.abs(totalA - totalB) / 10000;
            let result = totalA > totalB ? 
                `🏆 ${bestA.name}'s team wins by ${Math.round(margin)} runs` :
                `🏆 ${bestB.name}'s team wins by ${Math.round(margin)} runs`;
            
            return {
                team_a_win: Math.round(winProbA * 1000) / 10,
                team_b_win: Math.round((1 - winProbA) * 1000) / 10,
                score_a: Math.round(totalA / 10000),
                score_b: Math.round(totalB / 10000),
                result: result,
                key_a: bestA.name,
                key_b: bestB.name,
                confidence: Math.round(Math.abs(winProbA - 0.5) * 2 * 1000) / 10
            };
        }

        // Predict button handler
        function predict() {
            const teamA = document.getElementById('teamA').value;
            const teamB = document.getElementById('teamB').value;
            
            if (!teamA || !teamB) {
                alert('Please select both teams');
                return;
            }
            
            if (teamA === teamB) {
                alert('Please select two different teams');
                return;
            }
            
            const btn = document.getElementById('predictBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '🤖 SIMULATING 10,000 MATCHES...';
            
            setTimeout(() => {
                const teamAData = TEAMS_DATABASE[teamA];
                const teamBData = TEAMS_DATABASE[teamB];
                const prediction = simulateMatch(teamAData.players, teamBData.players);
                
                const resultDiv = document.getElementById('result');
                const contentDiv = document.getElementById('predictionContent');
                
                contentDiv.innerHTML = `
                    <div class="win-percentage">
                        <div class="team-a-percent">
                            <div class="percentage">${prediction.team_a_win}%</div>
                            <div>${teamA}</div>
                        </div>
                        <div class="team-b-percent">
                            <div class="percentage">${prediction.team_b_win}%</div>
                            <div>${teamB}</div>
                        </div>
                    </div>
                    
                    <div class="scores">
                        <div class="score-card">
                            <div class="score-number">${prediction.score_a}</div>
                            <div>Expected Score</div>
                        </div>
                        <div class="score-card">
                            <div class="score-number">${prediction.score_b}</div>
                            <div>Expected Score</div>
                        </div>
                    </div>
                    
                    <div class="result-text">${prediction.result}</div>
                    
                    <div class="key-players">
                        <div>🔥 ${prediction.key_a}</div>
                        <div>🔥 ${prediction.key_b}</div>
                    </div>
                    
                    <div class="confidence">🎯 AI Confidence: ${prediction.confidence}%</div>
                `;
                
                resultDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = originalText;
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // Event listeners
        document.getElementById('teamA').addEventListener('change', (e) => {
            loadPlayers(e.target.value, 'playersA');
        });
        
        document.getElementById('teamB').addEventListener('change', (e) => {
            loadPlayers(e.target.value, 'playersB');
        });
        
        document.getElementById('predictBtn').addEventListener('click', predict);
        
        // Initialize
        loadTeams();
    </script>
